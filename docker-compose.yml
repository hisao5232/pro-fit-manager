services:
  db:
    image: postgres:15-alpine
    container_name: profit-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - profit-internal

  backend:
    build: ./backend
    container_name: profit-backend
    restart: always
    # ports: - "3001:3001"  # Traefik経由ならポート開放も不要（内部通信のみでOK）
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    volumes:
      - ./backend/uploads:/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.profit-api.rule=Host(`pro-fit-api.go-pro-world.net`)"
      - "traefik.http.routers.profit-api.entrypoints=websecure"
      - "traefik.http.routers.profit-api.tls=true"
      - "traefik.http.routers.profit-api.tls.certresolver=lets-encrypt"
      - "traefik.http.services.profit-api.loadbalancer.server.port=3001"
      - "traefik.docker.network=traefik-public"
    depends_on:
      - db
    networks:
      - profit-internal
      - traefik-public

networks:
  profit-internal:
    driver: bridge
  traefik-public:
    external: true
